get:
  summary: Get compliance details for all directives
  description: Get current compliance of all the nodes of a Rudder server
  operationId: getDirectivesCompliance
  responses:
    "200":
      description: Success
      content:
        application/json:
          schema:
            type: object
            required:
              - result
              - action
              - data
            properties:
              result:
                type: string
                description: Result of the request
                enum:
                  - success
                  - error
                example: success
              action:
                type: string
                description: The id of the action
                enum:
                  - getDirectiveComplianceId
              data:
                type: object
                required:
                  - directivesCompliance
                properties:
                  directivesCompliance:
                    type: object
                    required:
                      - id
                      - name
                      - mode
                      - compliance
                      - complianceDetails
                      - rules
                      - nodes
                    properties:
                      id:
                        type: string
                        format: uuid
                        description: id of the directive
                        example: 9a1773c9-0889-40b6-be89-f6504443ac1b
                      name:
                        type: string
                        description: Name of the directive
                        example: test directive
                      mode:
                        type: string
                        enum:
                          - full-compliance
                          - changes-only
                          - reports-disabled
                      compliance:
                        type: number
                        format: float
                        description: Directive compliance level
                        example: 83.34
                      complianceDetails:
                        $ref: ../../components/schemas/compliance-details.yml
                      rules:
                        $ref: ../../components/schemas/directive-rule-compliance.yml
                      nodes:
                        $ref: ../../components/schemas/directive-node-compliance.yml

  tags:
    - Directives
  x-codeSamples:
    - lang: curl
      source:
        $ref: ../../code_samples/curl/directives/compliance.sh
