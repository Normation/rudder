get:
  summary: Compliance details by node
  description: Get the compliance of all rules that are applied to a given node
  operationId: getNodeComplianceId
  parameters:
    - in: query
      name: format
      schema:
        type: string
        enum:
          - csv
          - json
        default: json
      description: format of export
      style: form
      explode: false
    - $ref: ../../components/parameters/compliance-level.yml
    - $ref: ../../components/parameters/compliance-percent-precision.yml
    - $ref: ../../components/parameters/node-id.yml
  responses:
    "200":
      description: Success
      content:
        application/json:
          schema:
            type: object
            required:
              - result
              - action
              - data
            properties:
              result:
                type: string
                description: Result of the request
                enum:
                  - success
                  - error
                example: success
              action:
                type: string
                description: The id of the action
                enum:
                  - getNodeComplianceId
              data:
                type: object
                required:
                  - nodes
                properties:
                  nodes:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - mode
                        - compliance
                        - complianceDetails
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: id of the node
                          example: f37f4928-fcb5-4acf-a422-d40f123a9670
                        mode:
                          type: string
                          enum:
                            - full-compliance
                            - changes-only
                            - reports-disabled
                        compliance:
                          type: number
                          format: float
                          description: Rule compliance level
                          example: 57.43
                        complianceDetails:
                          $ref: ../../components/schemas/compliance-details.yml
        text/plain:
          schema:
            type: string
          example: |
            "Rule","Directive","Block","Component","Value","Status","Message"
            "R1","directive e9a1a909-2490-4fc9-95c3-9d0aa01717c9","","e9a1a909-2490-4fc9-95c3-9d0aa01717c9-component-br1-bn1","e9a1a909-2490-4fc9-95c3-9d0aa01717c9-component-value-br1-bn1","successAlreadyOK",""
            "R3","directive2","","directive2-component-br3-bn1","directive2-component-value-br3-bn1","error",""
            "R2","directive 99f4ef91-537b-4e03-97bc-e65b447514cc","","99f4ef91-537b-4e03-97bc-e65b447514cc-component-br2-bn1","99f4ef91-537b-4e03-97bc-e65b447514cc-component-value-br2-bn1","successRepaired",""

  tags:
    - Nodes
  x-codeSamples:
    - lang: curl
      source:
        $ref: ../../code_samples/curl/nodes/compliance-id.sh
