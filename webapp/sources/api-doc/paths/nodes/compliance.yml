get:
  summary: Compliance details for all nodes
  description: Get current compliance of all managed nodes
  operationId: getNodesCompliance
  parameters:
    - $ref: ../../components/parameters/compliance-level.yml
    - $ref: ../../components/parameters/compliance-percent-precision.yml
  responses:
    "200":
      description: Success
      content:
        application/json:
          schema:
            type: object
            required:
              - result
              - action
              - data
            properties:
              result:
                type: string
                description: Result of the request
                enum:
                  - success
                  - error
                example: success
              action:
                type: string
                description: The id of the action
                enum:
                  - getNodesCompliance
              data:
                type: object
                required:
                  - nodes
                properties:
                  nodes:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - mode
                        - compliance
                        - complianceDetails
                      properties:
                        id:
                          type: string
                          format: uuid
                          description: id of the node
                          example: f37f4928-fcb5-4acf-a422-d40f123a9670
                        mode:
                          type: string
                          enum:
                            - full-compliance
                            - changes-only
                            - reports-disabled
                        compliance:
                          type: number
                          format: float
                          description: Rule compliance level
                          example: 57.43
                        complianceDetails:
                          $ref: ../../components/schemas/compliance-details.yml
  tags:
    - Nodes
  x-codeSamples:
    - lang: curl
      source:
        $ref: ../../code_samples/curl/nodes/compliance.sh
