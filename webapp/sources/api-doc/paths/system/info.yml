get:
  summary: Get server information
  description: Get information about the server and Rudder
  operationId: getSystemInfo
  responses:
    "200":
      description: Service information
      content:
        application/json:
          schema:
            type: object
            required:
              - result
              - action
              - data
            properties:
              result:
                type: string
                description: Result of the request
                enum:
                  - success
                  - error
              action:
                type: string
                description: The id of the action
                enum:
                  - info
              data:
                type: object
                description: Information about the service
                required:
                  - rudder
                  - system
                  - nodes
                  - plugins
                properties:
                  rudder:
                    type: object
                    $ref: ../../components/schemas/system-info-general.yml
                  system:
                    type: object
                    $ref: ../../components/schemas/system.yml
                  nodes:
                    type: object
                    $ref: ../../components/schemas/system-nodes.yml
                  plugins:
                    type: array
                    items:
                      $ref: ../../components/schemas/system-plugins.yml
  tags:
    - System
  x-codeSamples:
    - lang: curl
      source:
        $ref: ../../code_samples/curl/system/info.sh
