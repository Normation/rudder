type: object
required:
  - result
  - id
  - action
  - data
properties:
  result:
    type: string
    description: Result of the request
    enum:
      - success
      - error
    example: success
  id:
    type: string
    format: uuid
    description: id of the directive
    example: 9a1773c9-0889-40b6-be89-f6504443ac1b
  action:
    type: string
    description: The id of the action
    enum:
      - getDirectiveComplianceId
  data:
    type: object
    required:
      - directiveCompliance
    properties:
      directiveCompliance:
        type: object
        required:
          - id
          - name
          - mode
          - compliance
          - complianceDetails
          - rules
          - nodes
        properties:
          id:
            type: string
            format: uuid
            description: id of the directive
            example: 9a1773c9-0889-40b6-be89-f6504443ac1b
          name:
            type: string
            description: Name of the directive
            example: test directive
          mode:
            type: string
            enum:
              - full-compliance
              - changes-only
              - reports-disabled
          compliance:
            type: number
            format: float
            description: Directive compliance level
            example: 83.34
          complianceDetails:
            $ref: ../schemas/compliance-details.yml
          rules:
            type: array
            items:
              $ref: ../schemas/directive-rule-compliance.yml
          nodes:
            type: array
            items:
              $ref: ../schemas/directive-node-compliance.yml
