required:
  - total
  - audit
  - enforce
  - mixed
  - enabled
  - disabled
properties:
  total:
    type: integer
    description: Count of all nodes managed by Rudder
    example: 17
  audit:
    type: integer
    description: Count of nodes that only apply audit configuration
    example: 5
  enforce:
    type: integer
    description: Count of nodes that only apply enforce configuration
    example: 10
  mixed:
    type: integer
    description: Count of nodes that apply audit and enforce configuration
    example: 2
  enabled:
    type: integer
    description: Count of enabled nodes
    example: 17
  disabled:
    type: integer
    description: Count of disabled nodes
    example: 0
