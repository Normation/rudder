type: object
required:
  - id
  - name
  - compliance
  - complianceDetails
  - rules
properties:
  id:
    type: string
    format: uuid
    description: id of the node
    example: b6ded8e2-2709-4986-973d-8e5522d20718
  name:
    type: string
    description: Name of the node
    example: agent1.rudder.local
  compliance:
    type: number
    format: float
    description: Directive compliance level
    example: 83.34
  complianceDetails:
    $ref: compliance-details.yml
  rules:
    type: array
    items:
      $ref: rule-compliance-component.yml
