description: LAW4 admin creates a parameter with the exact tenant he chose
user: admin
method: PUT
url: /api/latest/parameters
headers:
  - "Content-Type: application/json"
body: >-
  {
    "id": "lawParamAdmin",
    "value": "v",
    "description": "d",
    "security": {
      "tenants": [
        "zoneA"
      ]
    }
  }
response:
  code: 200
  content: >-
    {
      "action": "createParameter",
      "id": "lawParamAdmin",
      "result": "success",
      "data": {
        "parameters": [
          {
            "id": "lawParamAdmin",
            "value": "v",
            "description": "d",
            "security": {
              "tenants": [
                "zoneA"
              ]
            }
          }
        ]
      }
    }
