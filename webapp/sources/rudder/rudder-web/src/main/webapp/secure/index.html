<lift:surround with="common-layout" at="content">

    <head>
      <title>Rudder - Home</title>
      <link   type="text/css"        data-lift="with-cached-resource" href="/style/rudder/rudder-dashboard.css" rel="stylesheet">
    </head>

    <div class="rudder-template">
        <div class="homePage d-flex w-100">
            <div class="container-fluid overflow-x-hidden p-2 p-lg-3 p-xl-4">

                <div class="row">
                    <div class="col-lg-8 col-xl-9">
                        <div class="row row-cols-3 row-cols-xl-6 g-2 g-lg-3 g-xl-4">
                            <div class="col">
                                <a href="/secure/nodeManager/nodes" class="card h-100">
                                    <div class="card-body">
                                        <div class="d-flex flex-column h-100 justify-content-between">
                                            <div class="card-title text-body-secondary">Nodes</div>
                                            <p class="card-text fs-2 fw-medium"><span data-lift="HomePage.acceptedNodes"></span></p>
                                        </div>
                                        <div class="icon-link-container"><i class="fas fa-long-arrow-alt-up"></i></div>
                                    </div>
                                </a>
                            </div>
                            <div class="col">
                                <a href="/secure/nodeManager/manageNewNode" class="card h-100">
                                    <div class="card-body">
                                        <div class="d-flex flex-column h-100 justify-content-between">
                                            <div class="card-title text-body-secondary">Pending nodes</div>
                                            <p class="card-text fs-2 fw-medium"><span data-lift="HomePage.pendingNodes"></span></p>
                                        </div>
                                        <div class="icon-link-container"><i class="fas fa-long-arrow-alt-up"></i></div>
                                    </div>
                                </a>
                            </div>
                            <div class="col">
                                <a href="/secure/nodeManager/groups" class="card h-100">
                                    <div class="card-body">
                                        <div class="d-flex flex-column h-100 justify-content-between">
                                            <div class="card-title text-body-secondary">Groups</div>
                                            <p class="card-text fs-2 fw-medium"><span data-lift="HomePage.groups"></span></p>
                                        </div>
                                        <div class="icon-link-container"><i class="fas fa-long-arrow-alt-up"></i></div>
                                    </div>
                                </a>
                            </div>
                            <div class="col">
                                <a href="/secure/configurationManager/directiveManagement" class="card h-100">
                                    <div class="card-body">
                                        <div class="d-flex flex-column h-100 justify-content-between">
                                            <div class="card-title text-body-secondary">Directives</div>
                                            <p class="card-text fs-2 fw-medium"><span data-lift="HomePage.directives"></span></p>
                                        </div>
                                        <div class="icon-link-container"><i class="fas fa-long-arrow-alt-up"></i></div>
                                    </div>
                                </a>
                            </div>
                            <div class="col">
                                <a href="/secure/administration/maintenance#techniqueTree" class="card h-100">
                                    <div class="card-body">
                                        <div class="d-flex flex-column h-100 justify-content-between">
                                            <div class="card-title text-body-secondary">Techniques</div>
                                            <p class="card-text fs-2 fw-medium"><span data-lift="HomePage.techniques"></span></p>
                                        </div>
                                        <div class="icon-link-container"><i class="fas fa-long-arrow-alt-up"></i></div>
                                    </div>
                                </a>
                            </div>
                            <div class="col">
                                <a href="/secure/configurationManager/ruleManagement" class="card h-100">
                                    <div class="card-body">
                                        <div class="d-flex flex-column h-100 justify-content-between">
                                            <div class="card-title text-body-secondary">Rules</div>
                                            <p class="card-text fs-2 fw-medium"><span data-lift="HomePage.rules"></span></p>
                                        </div>
                                        <div class="icon-link-container"><i class="fas fa-long-arrow-alt-up"></i></div>
                                    </div>
                                </a>
                            </div>
                        </div>

                        <div class="row gx-2 gx-lg-3 gx-xl-4 my-2 my-lg-3 my-xl-4">
                            <div class="col-md-auto">
                                <div id="nodeOverview" class="card h-100">
                                    <h5 class="card-title py-2 px-3 mb-0">Global score breakdown</h5>
                                    <div class="card-body">
                                        <div class="node-compliance-chart d-flex align-items-center justify-content-center px-0 px-xl-3">
                                            <canvas id="nodeCompliance"></canvas>
                                            <div id="nodeCompliance-legend" class="ms-3"></div>
                                        </div>
                                        <div data-lift="lazy-load?template=lazy-load-spinner"><div data-lift="HomePage.getAllCompliance"></div></div>
                                    </div>
                                </div>
                            </div>
                            <div class="col mt-2 mt-md-0">
                                <div class="card h-100 global-compliance-details flex-grow-1">
                                    <h5 class="card-title py-2 px-3 mb-0">Global compliance details</h5>
                                    <div class="card-body d-flex flex-column">
                                        <div id="globalCompliance" class="w-100"></div>
                                        <div class="text-center mt-3 text-center text-secondary fs-5 mt-4" id="globalComplianceStats"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>

                    <div class="col-lg-4 col-xl-3 activity-container mb-2 mb-lg-3 mb-xl-4">
                        <div class="row h-100">
                            <div class="col">
                                <div class="card h-100">
                                    <h5 class="card-title py-2 px-3 mb-0">Activity</h5>
                                    <div class="card-body">
                                        <div id="activity-app"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-2 g-lg-3 g-xl-4 mb-2 mb-lg-3 mb-xl-4 flex-wrap">
                    <div class="col-auto flex-grow-1">
                        <div id="scoreBreakdown" class="card">
                            <h5 class="card-title py-2 px-3 mb-0">Score breakdown</h5>
                            <div class="card-body">
                              <div class="node-charts gap-1 gap-lg-2 gap-xl-4"></div>
                            </div>
                        </div>
                    </div>
                    <div class="col-auto flex-grow-1">
                        <div id="nodeBreakdown" class="card">
                            <h5 class="card-title py-2 px-3 mb-0">Node breakdown</h5>
                            <div class="card-body">
                                <div class="node-charts gap-1 gap-lg-2 gap-xl-4">

                                    <div class="node-chart px-1 px-xl-3 mb-4">
                                        <h4 class="px-2">By OS</h4>
                                        <div class="d-flex align-items-center justify-content-between">
                                            <canvas id="nodeOs"></canvas>
                                            <div  id="nodeOs-legend"></div>
                                            <div data-lift="lazy-load?template=lazy-load-spinner"> <div data-lift="HomePage.inventoryInfo" > </div></div>
                                        </div>
                                    </div>

                                    <div class="node-chart px-1 px-xl-3 mb-4">
                                        <h4 class="px-2">By agent version</h4>
                                        <div class="d-flex align-items-center justify-content-between">
                                            <canvas id="nodeAgents" > </canvas>
                                            <div  id="nodeAgents-legend"></div>
                                            <div data-lift="lazy-load?template=lazy-load-spinner"> <div data-lift="HomePage.rudderAgentVersion"></div></div>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript" data-lift="with-cached-resource" src="/javascript/rudder/elm/rudder-dashboard.js"></script>
    <script type="text/javascript" data-lift="with-cached-resource" src="/javascript/rudder/charting.js"></script>
    <script type="text/javascript" data-lift="with-cached-resource" src="/javascript/rudder/homePage.js"></script>
</lift:surround>
