<lift:surround with="common-layout" at="content">

    <head>
        <title>Rudder - Patch and vulnerabilities dashboard</title>
        <link   type="text/css"        data-lift="with-cached-resource" href="/style/rudder/rudder-dashboard.css" rel="stylesheet">

        <script src="/javascript/rudder/charting.js" data-lift="with-cached-resource"></script>
    </head>

    <div class="rudder-template"  data-lift="VulnPatchDashboard.details">
        <div class="one-col dashboard w-100">
            <div class="main-header">
                <div class="header-title">
                    <h1>
                        <span>Patches & vulnerabilities</span>
                    </h1>
                </div>
            </div>
            <div class="main-navbar"></div>
            <div class="container-fluid p-0 w-100">
                <div class="row">
                    <div class="col" id="system-update-container"></div>
                </div>
                <div class="row">
                    <div class="col" id="cve-container"></div>
                </div>
            </div>
        </div>

    </div>
</lift:surround>
